spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  datasource:
    url: ${SUPABASE_DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/rippo}}
    username: ${SUPABASE_DB_USERNAME:${DATABASE_USERNAME:postgres}}
    password: ${SUPABASE_DB_PASSWORD:${DATABASE_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_TIMEOUT:2s}
      repositories:
        enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: rippo
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: rippo
    default-schema: rippo
    create-schemas: true
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope:
              - read:user
              - user:email
              - repo

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash
  temperature: 0.1
  max-output-tokens: 4096
  retry:
    max-attempts: 3
    initial-backoff-ms: 500
    max-backoff-ms: 4000

rippo:
  cache:
    default-ttl: ${CACHE_DEFAULT_TTL:10m}
    repository-metadata-ttl: ${CACHE_REPOSITORY_METADATA_TTL:1h}
    readme-ttl: ${CACHE_README_TTL:6h}
    directory-ttl: ${CACHE_DIRECTORY_TTL:1h}
    file-ttl: ${CACHE_FILE_TTL:6h}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [session=%X{chatSessionId:-none}] %logger{36} - %msg%n"
