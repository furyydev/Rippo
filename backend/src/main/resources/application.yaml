spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  datasource:
    url: ${SUPABASE_DB_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/rippo}}
    username: ${SUPABASE_DB_USERNAME:${DATABASE_USERNAME:postgres}}
    password: ${SUPABASE_DB_PASSWORD:${DATABASE_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: rippo
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: rippo
    default-schema: rippo
    create-schemas: true
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: ${GITHUB_CLIENT_ID:}
            client-secret: ${GITHUB_CLIENT_SECRET:}
            scope:
              - read:user
              - user:email
              - repo

gemini:
  api-key: ${GEMINI_API_KEY}
  model: gemini-2.5-flash
  temperature: 0.1
  max-output-tokens: 4096
  retry:
    max-attempts: 3
    initial-backoff-ms: 500
    max-backoff-ms: 4000

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [session=%X{chatSessionId:-none}] %logger{36} - %msg%n"
