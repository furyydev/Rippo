spring:
  datasource:
    url: jdbc:h2:mem:rippo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      client:
        registration:
          github:
            client-id: test-client-id
            client-secret: test-client-secret
  data:
    redis:
      connect-timeout: 100ms
      timeout: 100ms

gemini:
  api-key: test-api-key
  model: gemini-2.5-flash
